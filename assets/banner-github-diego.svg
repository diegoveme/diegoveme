<svg viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050408"/>
      <stop offset="55%" stop-color="#0A0714"/>
      <stop offset="100%" stop-color="#150D28"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E9D5FF"/>
      <stop offset="45%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="glowCube">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowStar">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#C084FC" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .fade { animation: fadeUp 0.9s ease-out both; }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.35s; }
    .d3 { animation-delay: 0.6s; }
    .d4 { animation-delay: 0.85s; }
    .d5 { animation-delay: 1.1s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .tw { animation: twinkle 3.2s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50%      { opacity: 0.95; }
    }
    .cube { animation: floaty 5.5s ease-in-out infinite; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .pulse {
      transform-box: fill-box; transform-origin: center;
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%      { transform: scale(1.28); opacity: 0.85; }
    }
    .ringSpin {
      transform-box: fill-box; transform-origin: center;
      animation: spin 45s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wave {
      transform-box: fill-box; transform-origin: 20% 90%;
      animation: wave 2.4s ease-in-out infinite;
    }
    @keyframes wave {
      0%, 55%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(18deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
    }
    .cursor { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink {
      0%, 49%  { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .barGrow {
      transform-box: fill-box; transform-origin: left center;
      animation: grow 1s 0.5s ease-out both;
    }
    @keyframes grow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }
  </style>

  <!-- Fondo -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <circle cx="990" cy="200" r="185" fill="url(#glowCube)"/>

  <!-- Estrellas parpadeantes -->
  <g fill="#E9D5FF">
    <circle class="tw" cx="120"  cy="60"  r="2"   style="animation-delay:0s"/>
    <circle class="tw" cx="320"  cy="340" r="1.8" style="animation-delay:0.6s"/>
    <circle class="tw" cx="540"  cy="55"  r="2"   style="animation-delay:1.2s"/>
    <circle class="tw" cx="760"  cy="330" r="1.6" style="animation-delay:1.8s"/>
    <circle class="tw" cx="700"  cy="90"  r="1.8" style="animation-delay:2.4s"/>
    <circle class="tw" cx="1140" cy="70"  r="2"   style="animation-delay:0.9s"/>
    <circle class="tw" cx="1150" cy="350" r="1.8" style="animation-delay:1.5s"/>
    <circle class="tw" cx="850"  cy="45"  r="1.6" style="animation-delay:2.1s"/>
    <circle class="tw" cx="60"   cy="300" r="1.8" style="animation-delay:2.7s"/>
    <path class="tw" d="M810 355 l3.5 10 10 3.5 -10 3.5 -3.5 10 -3.5 -10 -10 -3.5 10 -3.5 z" style="animation-delay:0.3s"/>
    <path class="tw" d="M885 95 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z" style="animation-delay:1.7s"/>
    <circle class="tw" cx="200"  cy="110" r="1.5" style="animation-delay:1.1s"/>
    <circle class="tw" cx="430"  cy="90"  r="1.4" style="animation-delay:2.9s"/>
    <circle class="tw" cx="640"  cy="330" r="1.5" style="animation-delay:0.4s"/>
    <circle class="tw" cx="170"  cy="350" r="1.6" style="animation-delay:3.1s"/>
    <circle class="tw" cx="480"  cy="300" r="1.3" style="animation-delay:1.4s"/>
    <circle class="tw" cx="950"  cy="368" r="1.5" style="animation-delay:2.6s"/>
    <circle class="tw" cx="1050" cy="40"  r="1.4" style="animation-delay:0.7s"/>
    <circle class="tw" cx="380"  cy="45"  r="1.6" style="animation-delay:1.9s"/>
    <path class="tw" d="M600 70 l2.8 8.5 8.5 2.8 -8.5 2.8 -2.8 8.5 -2.8 -8.5 -8.5 -2.8 8.5 -2.8 z" style="animation-delay:2.0s"/>
    <path class="tw" d="M105 200 l2.5 7.5 7.5 2.5 -7.5 2.5 -2.5 7.5 -2.5 -7.5 -7.5 -2.5 7.5 -2.5 z" style="animation-delay:3.4s"/>
    <path class="tw" d="M225 190 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z" style="animation-delay:2.3s"/>
  </g>

  <!-- Titulo -->
  <g class="fade d2">
    <text x="66" y="215" font-family="Inter,'Segoe UI',Arial,sans-serif"
          font-size="66" font-weight="900" fill="url(#purple)">Hi, I'm Diego Vega</text>
    <text class="wave" x="672" y="213" font-size="52">👋</text>
    <rect class="cursor" x="745" y="165" width="7" height="52" rx="2" fill="#A855F7"/>
  </g>

  <!-- Barra -->
  <rect class="barGrow" x="70" y="240" width="320" height="5" rx="2.5" fill="url(#purple)"/>

  <!-- Anillos del cubo -->
  <circle cx="990" cy="200" r="152" stroke="#A855F7" stroke-width="2.5" fill="none" opacity="0.28"/>
  <circle class="ringSpin" cx="990" cy="200" r="168" stroke="#A855F7" stroke-width="1.5"
          fill="none" opacity="0.15" stroke-dasharray="4 12"/>

  <!-- Cubo flotante -->
  <g class="cube">
    <g stroke="#C4B5FD" stroke-width="2.5" fill="none" filter="url(#soft)">
      <polygon points="990,90 1085,145 1085,255 990,310 895,255 895,145"/>
      <polygon points="990,130 1051,165 1051,235 990,270 929,235 929,165" stroke-opacity="0.9"/>
      <line x1="990" y1="90"  x2="990"  y2="130"/>
      <line x1="1085" y1="145" x2="1051" y2="165"/>
      <line x1="1085" y1="255" x2="1051" y2="235"/>
      <line x1="990" y1="310" x2="990"  y2="270"/>
      <line x1="895" y1="255" x2="929"  y2="235"/>
      <line x1="895" y1="145" x2="929"  y2="165"/>
      <g stroke-opacity="0.5" stroke-width="1.8">
        <line x1="990"  y1="130" x2="990" y2="200"/>
        <line x1="1051" y1="165" x2="990" y2="200"/>
        <line x1="1051" y1="235" x2="990" y2="200"/>
        <line x1="990"  y1="270" x2="990" y2="200"/>
        <line x1="929"  y1="235" x2="990" y2="200"/>
        <line x1="929"  y1="165" x2="990" y2="200"/>
      </g>
    </g>
    <g fill="#FFFFFF" filter="url(#soft)">
      <circle cx="990"  cy="90"  r="6"/>
      <circle cx="1085" cy="145" r="6"/>
      <circle cx="1085" cy="255" r="6"/>
      <circle cx="990"  cy="310" r="6"/>
      <circle cx="895"  cy="255" r="6"/>
      <circle cx="895"  cy="145" r="6"/>
      <circle cx="990"  cy="130" r="4.5" fill="#E9D5FF"/>
      <circle cx="1051" cy="165" r="4.5" fill="#E9D5FF"/>
      <circle cx="1051" cy="235" r="4.5" fill="#E9D5FF"/>
      <circle cx="990"  cy="270" r="4.5" fill="#E9D5FF"/>
      <circle cx="929"  cy="235" r="4.5" fill="#E9D5FF"/>
      <circle cx="929"  cy="165" r="4.5" fill="#E9D5FF"/>
    </g>
    <circle class="pulse" cx="990" cy="200" r="42" fill="url(#glowStar)"/>
    <g class="pulse">
      <path d="M990 172 L997 193 L1018 200 L997 207 L990 228 L983 207 L962 200 L983 193 Z" fill="#E9D5FF"/>
      <path d="M990 181 L995 195 L1009 200 L995 205 L990 219 L985 205 L971 200 L985 195 Z" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
